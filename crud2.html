<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      body {
        margin: 0;
        font-family: Georgia, "Times New Roman", Times, serif;
      }
      div {
        display: flex;
        flex-direction: column;
        align-items: center;
        text-align: center;
        margin: 90px;
        border: 3px solid;
        border-radius: 10px;
        padding: 10px;
        border-color: rgb(84, 84, 255);
      }
      input {
        border-radius: 5px;
        font-weight: bold;
        padding: 10px;
        border-color: rgb(142, 142, 253);
        color: rgb(83, 83, 255);
      }
      button {
        border: none;
        background: rgb(0, 0, 0);
        color: white;
        padding: 7px;
        border-radius: 10px;
      }
    </style>
  </head>
  <body>
    <div>
      <h2>Input Data Siswa</h2>

      <input type="text" id="nama" placeholder="Masukan Nama" /><br />
      <input type="text" id="rombel" placeholder="Masukan Rombel" /><br />
      <input type="number" id="nilai" placeholder="Masukan Nilai" /><br />

      <button onclick="tambah()">Tambah</button>

      <h2>Daftar Siswa</h2>
      <table border="">
        <tr>
          <td>Nama</td>
          <td>Rombel</td>
          <td>Nilai</td>
          <td>Grade</td>
          <td>Status</td>
          <td>Aksi</td>
        </tr>
        <tbody id="tabel"></tbody>
      </table>
    </div>
    <script>
      let data = [];

      function tambah() {
        let nama = document.getElementById("nama").value;
        let rombel = document.getElementById("rombel").value;
        let nilai = Number(document.getElementById("nilai").value);

        let grade = "";
        let status = "";

        if (nilai >= 90 && nilai <= 100) {
          grade = "A";
        } else if (nilai >= 80 && nilai < 90) {
          grade = "B";
        } else if (nilai >= 75 && nilai < 80) {
          grade = "C";
        } else if (nilai >= 60 && nilai < 75) {
          grade = "D";
        } else {
          grade = "E";
        }

        if (nilai >= 75 && nilai <= 100) {
          status = "Lulus";
        } else {
          status = "Tidak Lulus";
        }

        data.push({
          nama: nama,
          rombel: rombel,
          nilai: nilai,
          grade: grade,
          status: status,
        });

        tampil();
      }

      function tampil() {
        let isi = [];

        for (let i = 0; i < data.length; i++) {
          isi += `
                <tr>
                    <td>${data[i].nama}</td>
                    <td>${data[i].rombel}</td>
                    <td>${data[i].nilai}</td>
                    <td>${data[i].grade}</td>
                    <td>${data[i].status}</td>

                    <td><button onclick = "edit(${i})">Edit</button></td>
                    <td><button onclick = "hapus(${i})">delete</button></td>
                </tr>
                `;
        }
        document.getElementById("tabel").innerHTML = isi;
      }
      function hapus(i) {
        data.splice(i, 1);
        tampil();
      }
      function edit(i) {
        let namaNew = prompt("Edit Nama", data[i].nama);
        let rombelNew = prompt("Edit Rombel", data[i].rombel);
        let nilaiNew = Number(prompt("Edit Nilai", data[i].nilai));

        let grade = "";
        let status = "";

        if (nilaiNew >= 90) {
          grade = "A";
        } else if (nilaiNew >= 80) {
          grade = "B";
        } else if (nilaiNew >= 75) {
          grade = "C";
        } else if (nilaiNew >= 60) {
          grade = "D";
        } else {
          grade = "E";
        }

        if (nilaiNew >= 75) {
          status = "LULUS";
        } else {
          status = "TIDAK LULUS";
        }

        data[i] = {
          nama: namaNew,
          rombel: nilaiNew,
          nilai: nilaiNew,
          grade: grade,
          status: status,
        };
        tampil();
      }
    </script>
  </body>
</html>
